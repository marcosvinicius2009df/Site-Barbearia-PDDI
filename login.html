<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barbearia do Marquinhos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo">MINHA CONTA</div>
        <ul class="nav-links">
            <li><a href="index.html">Voltar ao Início</a></li>
        </ul>
    </nav>

    <div class="container-form">
        <div class="form-box">
            <h2 id="titulo-auth">Entrar na Conta</h2>
            <form id="form-auth">
                
                <div id="campo-nome" class="campo" style="display: none;">
                    <label>Nome Completo:</label>
                    <input type="text" id="nome-cadastro" placeholder="Como gosta de ser chamado?">
                </div>
                
                <div id="campo-whatsapp" class="campo" style="display: none;">
                    <label>WhatsApp (com DDD):</label>
                    <input type="text" id="zap-cadastro" placeholder="Ex: 61988887777">
                </div>

                <div class="campo">
                    <label>E-mail:</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="campo">
                    <label>Senha:</label>
                    <input type="password" id="senha" placeholder="********" required>
                </div>
                
                <button type="submit" id="btn-auth" class="btn-confirmar">ENTRAR</button>
                
                <p style="margin-top: 20px; text-align: center; font-size: 14px; color: #888;">
                    <span id="trocar-texto">Ainda não tem conta?</span> 
                    <a href="#" id="link-alternar" style="color: var(--dourado); text-decoration: none; font-weight: bold;">Cadastre-se</a>
                </p>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
