<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>JLukas Barber Shop - Oficial</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="firebase-init.js"></script>
    <script>
    // Verifica se o usuário está logado usando a configuração do firebase-init.js
    auth.onAuthStateChanged(user => {
        if (!user) { 
            alert("⚠️ Precisa fazer login para agendar!"); 
            window.location.href = "login.html"; 
        }
    });
</script>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">JLukas Barber Shop</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Voltar ao Início</a></li>
            <li><a href="perfil.html">Ver Meus Agendamentos</a></li>
        </ul>
    </nav>

    <div class="container-form">
        <div class="form-box" style="min-height: 450px; position: relative;">
            <h2>Reserve o seu Horário</h2>
            
            <div class="progress-container">
                <div class="progress-step active" id="step-1">1</div>
                <div class="progress-step" id="step-2">2</div>
                <div class="progress-step" id="step-3">3</div>
                <div class="progress-step" id="step-4">✓</div>
            </div>
            <p id="progress-text" style="text-align: center; color: var(--dourado); font-weight: bold; margin-bottom: 20px;">Seus Dados</p>

            <form id="form-agendamento">
                
                <div id="bloco-passo-1" class="bloco-etapa ativo">
                    <div class="campo">
                        <label>Seu Nome:</label>
                        <input type="text" id="nome" placeholder="A carregar..." required>
                    </div>
                    <div class="campo">
                        <label>WhatsApp (com DDD):</label>
                        <input type="text" id="whatsapp" placeholder="A carregar..." required>
                    </div>
                    <button type="button" class="btn-confirmar" onclick="avancarPasso(1)" style="margin-top: 20px;">CONTINUAR ➔</button>
                </div>
                
                <div id="bloco-passo-2" class="bloco-etapa">
                    <div class="campo">
                        <label>Profissional:</label>
                        <div id="lista-barbeiros-agendar" class="grid-selecao">
                            <p style="color:var(--texto-cinza);">A carregar equipa...</p>
                        </div>
                    </div>
                    
                    <div class="campo">
                        <label>Serviço(s):</label>
                        <div id="lista-servicos-agendar" class="grid-servicos">
                            <p style="color:var(--texto-cinza);">A carregar serviços...</p>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button type="button" class="btn-confirmar" onclick="voltarPasso(2)" style="background: transparent; border: 1px solid var(--dourado); color: var(--dourado);">⬅ VOLTAR</button>
                        <button type="button" class="btn-confirmar" onclick="avancarPasso(2)">CONTINUAR ➔</button>
                    </div>
                </div>

                <div id="bloco-passo-3" class="bloco-etapa">
                    <div class="campo">
                        <label>Data:</label>
                        <input type="date" id="data" required onchange="buscarHorariosOcupados();">
                    </div>
                    <div class="campo">
                        <label>Escolha o Horário:</label>
                        <div id="lista-horarios" class="grade-horarios"></div>
                    </div>

                    <div style="text-align: center; margin: 15px 0;">
                        <button type="button" onclick="entrarListaEspera()" style="background: transparent; color: var(--texto-cinza); border: none; font-size: 0.85rem; text-decoration: underline; cursor: pointer;">
                            Não achou o horário? Entrar na lista de espera.
                        </button>
                    </div>

                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button type="button" class="btn-confirmar" onclick="voltarPasso(3)" style="background: transparent; border: 1px solid var(--dourado); color: var(--dourado);">⬅ VOLTAR</button>
                        <button type="button" class="btn-confirmar" onclick="avancarPasso(3)">CONTINUAR ➔</button>
                    </div>
                </div>

                <div id="bloco-passo-4" class="bloco-etapa">
                    <div class="campo" style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 8px; border: 1px solid var(--borda); margin-bottom: 20px;">
                        <label style="color: var(--dourado);">🔄 Agendamento Inteligente:</label>
                        <select id="recorrencia" style="background: #000; margin-top: 5px;">
                            <option value="nenhuma">Agendar apenas este corte</option>
                            <option value="15">Repetir automaticamente a cada 15 dias</option>
                            <option value="30">Repetir automaticamente a cada 30 dias</option>
                        </select>
                    </div>

                    <div style="background: linear-gradient(145deg, rgba(212, 175, 55, 0.1), rgba(0,0,0,0.5)); border: 1px solid var(--dourado); padding: 15px; border-radius: 12px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px;" id="caixa-upsell">
                        <img src="https://images.unsplash.com/photo-1599305090598-fe179d501227?q=80&w=200&auto=format&fit=crop" style="width: 50px; height: 50px; border-radius: 8px; object-fit: cover;">
                        <div style="flex: 1;">
                            <h4 style="color: var(--dourado); font-size: 0.9rem;">🔥 Pomada Matte (+ R$ 45,00)</h4>
                        </div>
                        <input type="checkbox" id="upsell-pomada" style="width: 20px; height: 20px; accent-color: var(--dourado);">
                    </div>

                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button type="button" class="btn-confirmar" onclick="voltarPasso(4)" style="background: transparent; border: 1px solid var(--dourado); color: var(--dourado);">⬅ VOLTAR</button>
                        <button type="submit" id="btn-submit-agendar" class="btn-confirmar">CONFIRMAR</button>
                    </div>
                </div>

            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
