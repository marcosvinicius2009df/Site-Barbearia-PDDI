<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar - Barbearia do Marquinhos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo">AGENDAMENTO</div>
        <ul class="nav-links">
            <li><a href="index.html">Voltar ao Início</a></li>
        </ul>
    </nav>

    <div class="container-form">
        <div class="form-box">
            <h2>Reserve seu Horário</h2>
            <form id="form-agendamento">
                <div class="campo">
                    <label>Nome Completo:</label>
                    <input type="text" id="nome" placeholder="Seu nome" required>
                </div>
                <div class="campo">
                    <label>WhatsApp:</label>
                    <input type="text" id="whatsapp" placeholder="(61) 99999-9999" required>
                </div>
                <div class="campo">
                    <label>Profissional:</label>
                    <select id="barbeiro">
                        <option value="Marquinhos">Marquinhos</option>
                        <option value="João">João</option>
                    </select>
                </div>
                <div class="campo">
                    <label>Serviço:</label>
                    <select id="servico">
                        <option value="Corte Clássico - R$ 40,00">Corte Clássico - R$ 40,00</option>
                        <option value="Barba Completa - R$ 30,00">Barba Completa - R$ 30,00</option>
                        <option value="Combo Imperial - R$ 60,00">Combo Imperial - R$ 60,00</option>
                    </select>
                </div>
                <div class="campo">
                    <label>Data:</label>
                    <input type="date" id="data" required>
                </div>
                <div class="campo">
                    <label>Escolha o Horário:</label>
                    <div id="lista-horarios" class="grade-horarios">
                        </div>
                </div>
                <button type="submit" class="btn-confirmar">CONFIRMAR AGENDAMENTO</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
