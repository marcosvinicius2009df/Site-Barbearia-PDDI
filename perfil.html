<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
   <title>JLukas Barber Shop - Oficial</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="firebase-init.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">JLukas Barber Shop</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Início</a></li>
            <li><a href="produtos.html">Produtos</a></li>
            <li><button onclick="logout()" style="background:none; border:none; color:var(--dourado); cursor:pointer; font-weight:bold;">Sair</button></li>
        </ul>
    </nav>

    <div class="container-form" style="display: block; max-width: 800px; margin: 0 auto;">
        <div class="form-box" style="max-width: 100%; margin-top: 100px;">
            <h2 id="boas-vindas">Olá, Carregando...</h2>
            <p style="color: #888; margin-bottom: 20px;">Aqui estão os teus próximos agendamentos:</p>
            
            <div id="meus-agendamentos" class="cards-container" style="grid-template-columns: 1fr;">
                <p id="status-perfil">Buscando agendamentos...</p>
            </div>
        </div>
    </div>

    <script src="perfil.js"></script>
</body>
</html>
