<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Painel Admin - Barbearia do Marquinhos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body style="padding: 20px; background-color: var(--bg-fundo);">

    <div id="login-admin" class="container-form">
        <div class="form-box">
            <h2 style="text-align: center; color: var(--dourado);">Acesso Master</h2>
            <div class="campo">
                <input type="password" id="senha-admin" placeholder="Digite a senha master" style="width:100%; padding:15px; margin:10px 0; background:var(--bg-input); border:1px solid rgba(255,255,255,0.1); color:white; border-radius:8px;">
            </div>
            <button onclick="verificarAcesso()" class="btn-confirmar">ENTRAR NO PAINEL</button>
        </div>
    </div>

    <div id="conteudo-admin" style="display: none; max-width: 1100px; margin: 0 auto; margin-top: 20px; animation: slideUpFade 0.8s ease forwards;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--borda); padding-bottom: 20px; margin-bottom: 30px;">
            <h1 style="color: var(--dourado); text-shadow: var(--sombra-neon);">Painel Central</h1>
            <a href="index.html" style="color: var(--texto-cinza); text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 8px;">Sair do Painel</a>
        </div>

        <div id="resumo-painel">
            <div>
                <p style="color: var(--texto-cinza); font-size: 0.9rem;">Agendamentos Hoje</p>
                <h2 id="total-hoje" style="color: var(--dourado);">0</h2>
            </div>
            <div>
                <p style="color: var(--texto-cinza); font-size: 0.9rem;">Faturamento Estimado</p>
                <h2 id="faturamento-hoje">R$ 0,00</h2>
            </div>
            <div>
                <p style="color: var(--texto-cinza); font-size: 0.9rem;">Total de Clientes</p>
                <h2 id="total-clientes" style="color: var(--branco);">0</h2>
            </div>
        </div>

        <h2 style="color: var(--branco); margin-bottom: 20px;">📅 Próximos Clientes</h2>
        <div id="lista-agendamentos" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;">
            </div>

        <div style="margin-top: 80px; border-top: 1px solid var(--borda); padding-top: 40px;">
            <h2 style="color: var(--dourado); margin-bottom: 30px; font-size: 2rem;">📦 Gestão de Vitrine (Produtos)</h2>
            
            <div class="form-box" style="margin-bottom: 40px; max-width: 100%; padding: 30px;">
                <h3 style="color: var(--branco); margin-bottom: 20px;">Adicionar Novo Produto ao Site</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                    <input type="text" id="novo-prod-nome" placeholder="Nome (Ex: Pomada Matte)" style="padding: 15px; border-radius: 8px; background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--borda); outline: none;">
                    <input type="text" id="novo-prod-desc" placeholder="Descrição curta" style="padding: 15px; border-radius: 8px; background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--borda); outline: none;">
                    <input type="number" id="novo-prod-preco" placeholder="Preço (Ex: 45.00)" style="padding: 15px; border-radius: 8px; background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--borda); outline: none;">
                    <input type="text" id="novo-prod-img" placeholder="Link da Imagem (URL)" style="padding: 15px; border-radius: 8px; background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--borda); outline: none;">
                </div>
                <button onclick="salvarProduto()" class="btn-confirmar" style="padding: 15px; margin-top: 20px; font-size: 1rem;">+ PUBLICAR NO SITE</button>
            </div>

            <h3 style="color: var(--branco); margin-bottom: 20px;">🛒 Produtos Atualmente no Site</h3>
            <div id="lista-produtos-admin" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;">
                </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDy1-E_o45AuAbfyzNd8Qg6qS-d-pCFExM",
            authDomain: "barbearia-do-marcos.firebaseapp.com",
            databaseURL: "https://barbearia-do-marcos-default-rtdb.firebaseio.com",
            projectId: "barbearia-do-marcos",
            storageBucket: "barbearia-do-marcos.firebasestorage.app",
            messagingSenderId: "894105389352",
            appId: "1:894105389352:web:3a5a27602c0d589581e81d",
            measurementId: "G-53GKXL29Z9"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        function carregarDadosPainel() {
            const container = document.getElementById('lista-agendamentos');
            const dataHoje = new Date().toISOString().split('T')[0];

            // 1. Desliga o 'escutador' antigo para não duplicar
            database.ref('clientes').off(); 
            database.ref('agendamentos').off(); 

            // 2. Carrega Clientes
            database.ref('clientes').on('value', snap => {
                document.getElementById('total-clientes').innerText = snap.numChildren() || 0;
            });

            // 3. Carrega Agendamentos
            database.ref('agendamentos').on('value', snapshot => {
                container.innerHTML = "";
                let countHoje = 0; let faturaHoje = 0;
                const data = snapshot.val();
                if(!data) return;

                Object.keys(data).forEach(id => {
                    const item = data[id];
                    if(item.data === dataHoje) {
                        countHoje++;
                        const valor = parseFloat(item.servico.replace(/[^\d,]/g, '').replace(',', '.'));
                        if(!isNaN(valor)) faturaHoje += valor;
                    }
                    container.innerHTML += `
                        <div style="background: var(--bg-card); padding: 20px; border-radius: 12px; border-left: 5px solid var(--dourado);">
                            <h3 style="color:var(--dourado); margin-bottom: 10px;">⏰ ${item.horario} - ${item.cliente}</h3>
                            <p style="color: var(--texto-cinza);"><strong>Serviço:</strong> <span style="color:white">${item.servico}</span></p>
                            <p style="color: var(--texto-cinza);"><strong>WhatsApp:</strong> <span style="color:white">${item.whatsapp}</span></p>
                            <div style="margin-top:15px; display:flex; gap:10px;">
                                <a href="https://wa.me/${item.whatsapp}" target="_blank" style="background: rgba(0, 230, 118, 0.1); color: var(--sucesso); border: 1px solid var(--sucesso); padding:10px; border-radius: 8px; text-decoration: none; font-weight: bold; flex:1; text-align:center;">WHATSAPP</a>
                                <button onclick="removerAgendamento('${id}')" style="background: rgba(255, 23, 68, 0.1); color: var(--perigo); border: 1px solid var(--perigo); padding:10px; border-radius: 8px; font-weight: bold; width: 50%; cursor: pointer;">CONCLUÍDO</button>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('total-hoje').innerText = countHoje;
                document.getElementById('faturamento-hoje').innerText = `R$ ${faturaHoje.toFixed(2).replace('.', ',')}`;
            });
        }

        // --- GESTÃO DE AGENDAMENTOS (Já existia) ---
        function carregarDadosPainel() {
            const container = document.getElementById('lista-agendamentos');
            const dataHoje = new Date().toISOString().split('T')[0];

            database.ref('clientes').on('value', snap => {
                document.getElementById('total-clientes').innerText = snap.numChildren() || 0;
            });

            database.ref('agendamentos').on('value', snapshot => {
                container.innerHTML = "";
                let countHoje = 0; let faturaHoje = 0;
                const data = snapshot.val();
                if(!data) return;

                Object.keys(data).forEach(id => {
                    const item = data[id];
                    if(item.data === dataHoje) {
                        countHoje++;
                        const valor = parseFloat(item.servico.replace(/[^\d,]/g, '').replace(',', '.'));
                        if(!isNaN(valor)) faturaHoje += valor;
                    }
                    container.innerHTML += `
                        <div style="background: var(--bg-card); padding: 20px; border-radius: 12px; border-left: 5px solid var(--dourado);">
                            <h3 style="color:var(--dourado); margin-bottom: 10px;">⏰ ${item.horario} - ${item.cliente}</h3>
                            <p style="color: var(--texto-cinza);"><strong>Serviço:</strong> <span style="color:white">${item.servico}</span></p>
                            <p style="color: var(--texto-cinza);"><strong>WhatsApp:</strong> <span style="color:white">${item.whatsapp}</span></p>
                            <div style="margin-top:15px; display:flex; gap:10px;">
                                <a href="https://wa.me/${item.whatsapp}" target="_blank" style="padding:10px; flex:1; text-align:center;">WHATSAPP</a>
                                <button onclick="removerAgendamento('${id}')" style="padding:10px; width: 50%;">CONCLUÍDO</button>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('total-hoje').innerText = countHoje;
                document.getElementById('faturamento-hoje').innerText = `R$ ${faturaHoje.toFixed(2).replace('.', ',')}`;
            });
        }

        function removerAgendamento(id) {
            if(confirm("Marcar como concluído?")) { database.ref('agendamentos/' + id).remove(); }
        }

        // --- NOVA PARTE: GESTÃO DE PRODUTOS ---
        function salvarProduto() {
            const nome = document.getElementById('novo-prod-nome').value;
            const desc = document.getElementById('novo-prod-desc').value;
            const preco = parseFloat(document.getElementById('novo-prod-preco').value);
            const img = document.getElementById('novo-prod-img').value;

            if(!nome || !desc || !preco || !img) {
                alert("⚠️ Preencha todos os campos do produto!"); return;
            }

            database.ref('produtos').push({
                nome: nome, descricao: desc, preco: preco, imagem: img
            }).then(() => {
                alert("✅ Produto publicado no site!");
                document.getElementById('novo-prod-nome').value = '';
                document.getElementById('novo-prod-desc').value = '';
                document.getElementById('novo-prod-preco').value = '';
                document.getElementById('novo-prod-img').value = '';
            });
        }

        function carregarProdutosAdmin() {
            database.ref('produtos').on('value', snapshot => {
                const container = document.getElementById('lista-produtos-admin');
                container.innerHTML = "";
                snapshot.forEach(child => {
                    const p = child.val();
                    const id = child.key;
                    container.innerHTML += `
                        <div style="background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid var(--borda);">
                            <img src="${p.imagem}" style="width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 10px;">
                            <h4 style="color: var(--dourado);">${p.nome}</h4>
                            <p style="color: white; font-weight: bold; margin-bottom: 10px;">R$ ${p.preco.toFixed(2)}</p>
                            <button onclick="deletarProduto('${id}')" style="background: var(--perigo); color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold;">REMOVER</button>
                        </div>
                    `;
                });
            });
        }

        function deletarProduto(id) {
            if(confirm("Remover este produto do site? Ele sumirá na mesma hora para os clientes.")) {
                database.ref('produtos/' + id).remove();
            }
        }
    </script>
</body>
</html>
