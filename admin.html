<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Painel Admin - Barbearia do Marquinhos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body style="padding: 20px; background-color: var(--bg-fundo);">

    <div id="login-admin" class="container-form">
        <div class="form-box">
            <h2 style="text-align: center; color: var(--dourado);">Acesso Master</h2>
            <div class="campo">
                <input type="password" id="senha-admin" placeholder="Digite a senha master" style="width:100%; padding:15px; margin:10px 0; background:var(--bg-input); border:1px solid #333; color:white; border-radius:8px;">
            </div>
            <button onclick="verificarAcesso()" class="btn-confirmar">ENTRAR NO PAINEL</button>
        </div>
    </div>

    <div id="conteudo-admin" style="display: none; max-width: 1100px; margin: 0 auto; margin-top: 50px;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--borda); padding-bottom: 20px; margin-bottom: 30px;">
            <h1 style="color: var(--dourado);">Painel de Controle</h1>
            <a href="index.html" style="color: var(--texto-cinza); text-decoration: none; font-weight: bold;">Sair do Painel</a>
        </div>

        <div id="resumo-painel" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px;">
            <div style="background: var(--bg-card); padding: 25px; border-radius: 12px; border-left: 5px solid var(--dourado); box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                <p style="color: var(--texto-cinza); font-size: 0.9rem; margin-bottom: 10px;">Agendamentos Hoje</p>
                <h2 id="total-hoje" style="color: var(--dourado); font-size: 2rem;">0</h2>
            </div>
            <div style="background: var(--bg-card); padding: 25px; border-radius: 12px; border-left: 5px solid #25d366; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                <p style="color: var(--texto-cinza); font-size: 0.9rem; margin-bottom: 10px;">Faturamento Estimado</p>
                <h2 id="faturamento-hoje" style="color: #25d366; font-size: 2rem;">R$ 0,00</h2>
            </div>
            <div style="background: var(--bg-card); padding: 25px; border-radius: 12px; border-left: 5px solid var(--branco); box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                <p style="color: var(--texto-cinza); font-size: 0.9rem; margin-bottom: 10px;">Total de Clientes</p>
                <h2 id="total-clientes" style="color: var(--branco); font-size: 2rem;">0</h2>
            </div>
        </div>

        <h2 style="color: var(--branco); margin-bottom: 20px;">Próximos Clientes</h2>
        <div id="lista-agendamentos" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;">
            </div>
    </div>

    <script>
        // 1. CONFIGURAÇÃO DO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDy1-E_o45AuAbfyzNd8Qg6qS-d-pCFExM",
            authDomain: "barbearia-do-marcos.firebaseapp.com",
            databaseURL: "https://barbearia-do-marcos-default-rtdb.firebaseio.com",
            projectId: "barbearia-do-marcos",
            storageBucket: "barbearia-do-marcos.firebasestorage.app",
            messagingSenderId: "894105389352",
            appId: "1:894105389352:web:3a5a27602c0d589581e81d",
            measurementId: "G-53GKXL29Z9"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        // 2. FUNÇÃO DE LOGIN SIMPLES
        function verificarAcesso() {
            const senha = document.getElementById('senha-admin').value;
            if(senha === "admin123") {
                document.getElementById('login-admin').style.display = 'none';
                document.getElementById('conteudo-admin').style.display = 'block';
                carregarDadosPainel();
            } else {
                alert("⚠️ Senha incorreta!");
            }
        }

        // 3. CARREGAR DADOS E ESTATÍSTICAS
        function carregarDadosPainel() {
            const container = document.getElementById('lista-agendamentos');
            const dataHoje = new Date().toISOString().split('T')[0];

            // Contador de Clientes
            database.ref('clientes').on('value', snap => {
                document.getElementById('total-clientes').innerText = snap.numChildren() || 0;
            });

            // Agendamentos e Faturamento
            database.ref('agendamentos').on('value', snapshot => {
                container.innerHTML = "";
                let countHoje = 0;
                let faturaHoje = 0;
                const data = snapshot.val();
                
                if(!data) {
                    container.innerHTML = "<p style='color: var(--texto-cinza);'>Nenhum agendamento pendente.</p>";
                    document.getElementById('total-hoje').innerText = "0";
                    document.getElementById('faturamento-hoje').innerText = "R$ 0,00";
                    return;
                }

                Object.keys(data).forEach(id => {
                    const item = data[id];
                    item.id = id;

                    // Cálculo do Dashboard (apenas para hoje)
                    if(item.data === dataHoje) {
                        countHoje++;
                        // Extrai o preço do texto (ex: "Corte R$ 40,00" -> 40)
                        const valor = parseFloat(item.servico.replace(/[^\d,]/g, '').replace(',', '.'));
                        if(!isNaN(valor)) faturaHoje += valor;
                    }

                    // Criar Card Visual
                    const card = document.createElement('div');
                    card.style.cssText = "padding:20px; background: var(--bg-card); border-radius:10px; border-left: 5px solid var(--dourado); box-shadow: 0 4px 6px rgba(0,0,0,0.3);";
                    card.innerHTML = `
                        <h3 style="color:var(--dourado); margin-bottom: 10px;">⏰ ${item.horario} - ${item.cliente}</h3>
                        <p style="margin:5px 0; color: var(--texto-cinza);"><strong>Serviço:</strong> <span style="color:var(--branco)">${item.servico}</span></p>
                        <p style="margin:5px 0; color: var(--texto-cinza);"><strong>Data:</strong> <span style="color:var(--branco)">${item.data}</span></p>
                        <p style="margin:5px 0; color: var(--texto-cinza);"><strong>Profissional:</strong> <span style="color:var(--branco)">${item.barbeiro}</span></p>
                        <p style="margin:5px 0; color: var(--texto-cinza);"><strong>WhatsApp:</strong> <span style="color:var(--branco)">${item.whatsapp}</span></p>
                        
                        <div style="margin-top:20px; display:flex; gap:10px;">
                            <a href="https://wa.me/${item.whatsapp}" target="_blank" style="background:#25d366; color:white; padding:12px; border-radius:8px; text-decoration:none; flex:1; text-align:center; font-weight:bold; font-size: 0.85rem;">WHATSAPP</a>
                            <button onclick="remover('${item.id}')" style="background:#cc0000; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold; font-size: 0.85rem;">CONCLUÍDO</button>
                        </div>
                    `;
                    container.appendChild(card);
                });

                // Atualiza números no topo
                document.getElementById('total-hoje').innerText = countHoje;
                document.getElementById('faturamento-hoje').innerText = `R$ ${faturaHoje.toFixed(2).replace('.', ',')}`;
            });
        }

        // 4. FUNÇÃO PARA REMOVER (CONCLUIR)
        function remover(id) {
            if(confirm("Marcar este atendimento como concluído e remover da lista?")) {
                database.ref('agendamentos/' + id).remove()
                .catch(error => alert("Erro ao remover: " + error.message));
            }
        }
    </script>
</body>
</html>
