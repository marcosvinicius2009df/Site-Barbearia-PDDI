<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Marquinhos</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body style="padding: 20px;">

    <div id="login-admin" class="container-form">
        <div class="form-box">
            <h2 style="text-align: center; color: var(--dourado);">Acesso Master</h2>
            <div class="campo">
                <input type="password" id="senha-admin" placeholder="Senha master" style="width:100%; padding:12px; margin:10px 0; background:#1a1a1a; border:1px solid #333; color:white; border-radius:5px;">
            </div>
            <button onclick="verificarAcesso()" class="btn-confirmar">ENTRAR NO PAINEL</button>
        </div>
    </div>

    <div id="conteudo-admin" style="display: none; max-width: 1100px; margin: 0 auto; padding-top: 50px;">
        <h1 style="color: var(--dourado); text-align:center; margin-bottom: 30px;">Agenda de Clientes</h1>
        
        <div class="cards-container" id="lista-admin">
            </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO FIREBASE
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "barbearia-do-marcos.firebaseapp.com",
            databaseURL: "https://barbearia-do-marcos-default-rtdb.firebaseio.com",
            projectId: "barbearia-do-marcos",
            storageBucket: "barbearia-do-marcos.appspot.com",
            messagingSenderId: "894105389352",
            appId: "1:894105389352:web:3a5a27602c0d589581e81d"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        function verificarAcesso() {
            const senha = document.getElementById('senha-admin').value;
            if(senha === "1234") { // Altere a senha aqui
                document.getElementById('login-admin').style.display = 'none';
                document.getElementById('conteudo-admin').style.display = 'block';
                carregarAgenda();
            } else {
                alert("Senha incorreta!");
            }
        }

        function carregarAgenda() {
            database.ref('agendamentos').on('value', snapshot => {
                const container = document.getElementById('lista-admin');
                container.innerHTML = "";
                const data = snapshot.val();

                if(!data) {
                    container.innerHTML = "<p style='text-align:center;'>Nenhum agendamento encontrado.</p>";
                    return;
                }

                // Transforma em array e ordena por data/hora
                const listaOrdenada = Object.keys(data).map(id => ({ id, ...data[id] }))
                    .sort((a, b) => a.data.localeCompare(b.data) || a.horario.localeCompare(b.horario));

                listaOrdenada.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "card-item";
                    card.style.marginBottom = "15px";
                    card.innerHTML = `
                        <div style="padding:20px; background: #161616; border-radius:10px; border-left: 5px solid var(--dourado);">
                            <h3 style="color:var(--dourado);">${item.horario} - ${item.cliente}</h3>
                            <p style="margin:5px 0;"><strong>Serviço:</strong> ${item.servico}</p>
                            <p style="margin:5px 0;"><strong>Data:</strong> ${item.data}</p>
                            <p style="margin:5px 0;"><strong>WhatsApp:</strong> ${item.whatsapp}</p>
                            <div style="margin-top:15px; display:flex; gap:10px;">
                                <a href="https://api.whatsapp.com/send?phone=${item.whatsapp}" target="_blank" style="background:#25d366; color:white; padding:10px; border-radius:5px; text-decoration:none; flex:1; text-align:center; font-weight:bold;">ZAP DO CLIENTE</a>
                                <button onclick="remover('${item.id}')" style="background:#cc0000; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold;">APAGAR</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        function remover(id) {
            if(confirm("Deseja apagar permanentemente este agendamento?")) {
                database.ref('agendamentos/' + id).remove();
            }
        }
    </script>
</body>
</html>
