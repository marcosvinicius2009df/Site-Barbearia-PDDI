<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
   <title>JLukas Barber Shop - Oficial</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">JLukas Barber Shop</a></div>
        <div class="menu-toggle" id="mobile-menu">☰</div>
        <ul class="nav-links">
            <li><a href="index.html">Início</a></li>
            <li><a href="agendar.html">Agendar</a></li>
            <li><a href="perfil.html">Meu Perfil</a></li>
        </ul>
    </nav>

    <div class="cart-icon" onclick="abrirCarrinho()">
        🛒 <span id="contagem-carrinho" class="cart-count">0</span>
    </div>

    <section class="secao-produtos" style="margin-top: 50px;">
        <h2 class="titulo-secao">Nossa Linha</h2>
        
        <div id="vitrine-produtos" class="cards-container">
            <p style="color: var(--dourado); font-size: 1.2rem;">Carregando produtos da loja...</p>
        </div>
    </section>

    <div id="modal-carrinho">
        <div class="form-box">
            <h2 style="color: var(--dourado);">Meu Carrinho</h2>
            <div id="itens-carrinho"></div>
            <hr style="border: 0; border-top: 1px solid var(--borda); margin: 20px 0;">
            <h3 id="total-carrinho" style="text-align: right; color: white;">Total: R$ 0,00</h3>
            <button onclick="finalizarCompra()" class="btn-confirmar" style="margin-top: 20px; background: linear-gradient(135deg, #00e676, #00bfa5); color: #000;">PEDIR VIA WHATSAPP</button>
            <button onclick="fecharCarrinho()" class="btn-horario" style="margin-top: 15px; width: 100%;">Voltar para a Loja</button>
        </div>
    </div>

    <script>
        // Menu Hambúrguer (Replicado para não bugar no mobile)
        const menuToggle = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');
        if (menuToggle) { menuToggle.addEventListener('click', () => { navLinks.classList.toggle('active'); }); }
        document.querySelectorAll('.nav-links li a').forEach(link => { link.addEventListener('click', () => { navLinks.classList.remove('active'); }); });

        // INICIALIZANDO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDy1-E_o45AuAbfyzNd8Qg6qS-d-pCFExM",
            authDomain: "barbearia-do-marcos.firebaseapp.com",
            databaseURL: "https://barbearia-do-marcos-default-rtdb.firebaseio.com",
            projectId: "barbearia-do-marcos",
            storageBucket: "barbearia-do-marcos.firebasestorage.app",
            messagingSenderId: "894105389352",
            appId: "1:894105389352:web:3a5a27602c0d589581e81d",
            measurementId: "G-53GKXL29Z9"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        // 1. CARREGAR VITRINE DO FIREBASE
        function carregarVitrine() {
            const vitrine = document.getElementById('vitrine-produtos');

            database.ref('produtos').on('value', snapshot => {
                vitrine.innerHTML = ""; // Limpa o texto "Carregando"
                const data = snapshot.val();

                if(!data) {
                    vitrine.innerHTML = "<p style='color: var(--texto-cinza); font-size: 1.2rem;'>Estoque esgotado no momento. Volte em breve!</p>";
                    return;
                }

                // Cria o visual de cada produto igual ao Style que fizemos
                snapshot.forEach(child => {
                    const p = child.val();
                    vitrine.innerHTML += `
                        <div class="card-item">
                            <img src="${p.imagem}" alt="${p.nome}">
                            <h3>${p.nome}</h3>
                            <p>${p.descricao}</p>
                            <span class="preco-tag">R$ ${parseFloat(p.preco).toFixed(2).replace('.', ',')}</span>
                            <button onclick="adicionarAoCarrinho('${p.nome}', ${p.preco})" class="btn-confirmar" style="margin-top:20px; font-size: 1rem; padding: 15px;">+ ADICIONAR</button>
                        </div>
                    `;
                });
            });
        }
        
        carregarVitrine(); // Roda a função quando a página abre

        // 2. SISTEMA DO CARRINHO (IGUAL O ANTERIOR)
        let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

        function adicionarAoCarrinho(nome, preco) {
            carrinho.push({nome, preco});
            atualizarIcone();
            alert("🛒 " + nome + " foi para o carrinho!");
        }

        function atualizarIcone() {
            document.getElementById('contagem-carrinho').innerText = carrinho.length;
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
        }

        function abrirCarrinho() {
            const modal = document.getElementById('modal-carrinho');
            modal.style.visibility = 'visible';
            modal.classList.add('ativo');
            renderizarCarrinho();
        }

        function fecharCarrinho() {
            const modal = document.getElementById('modal-carrinho');
            modal.classList.remove('ativo');
            setTimeout(() => { modal.style.visibility = 'hidden'; }, 400); 
        }

        function renderizarCarrinho() {
            const lista = document.getElementById('itens-carrinho');
            let total = 0;
            lista.innerHTML = "";
            carrinho.forEach((item, index) => {
                total += item.preco;
                lista.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom:15px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;">
                        <span style="color: white; font-weight: 500;">${item.nome}</span>
                        <span>
                            <span style="color: var(--dourado); margin-right: 15px;">R$ ${item.preco.toFixed(2)}</span> 
                            <button onclick="removerItem(${index})" style="background:#ff1744; border:none; color:white; padding: 5px 10px; border-radius: 6px; cursor:pointer;">X</button>
                        </span>
                    </div>`;
            });
            document.getElementById('total-carrinho').innerText = `Total: R$ ${total.toFixed(2)}`;
        }

        function removerItem(index) {
            carrinho.splice(index, 1);
            atualizarIcone();
            renderizarCarrinho();
        }

        function finalizarCompra() {
            if(carrinho.length === 0) return alert("Carrinho vazio!");
            let texto = "Olá! Gostaria de encomendar os seguintes produtos:%0A%0A";
            let total = 0;
            carrinho.forEach(item => {
                texto += `- ${item.nome} (R$ ${item.preco.toFixed(2)})%0A`;
                total += item.preco;
            });
            texto += `%0A*Total: R$ ${total.toFixed(2)}*`;
            window.location.href = `https://wa.me/5561999999999?text=${texto}`;
        }
        
        atualizarIcone();
    </script>
</body>
</html>
