<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>JLukas Barber Shop - Loja Oficial</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="firebase-init.js"></script>
</head>
<body style="background-color: var(--bg-fundo); color: white;">
    
    <nav class="navbar">
        <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">JLukas Barber Shop</a></div>
        <div class="menu-toggle" id="mobile-menu">☰</div>
        <ul class="nav-links">
            <li><a href="index.html">Início</a></li>
            <li><a href="agendar.html">Agendar</a></li>
            <li><a href="perfil.html">Meu Perfil</a></li>
        </ul>
    </nav>

    <div class="cart-icon" onclick="abrirCarrinho()">
        🛒 <span id="contagem-carrinho" class="cart-count">0</span>
    </div>

    <section class="secao-produtos" style="margin-top: 100px; text-align: center;">
        <h2 class="titulo-secao">Nossa Linha Exclusiva</h2>
        <p style="color: var(--texto-cinza); margin-bottom: 40px;">Produtos premium selecionados pelos nossos barbeiros.</p>
        
        <div id="vitrine-produtos" class="cards-container">
            <div style="width: 100%; text-align: center; color: var(--dourado); font-size: 1.2rem; padding: 50px;">
                A carregar o nosso catálogo... <i class="fa-solid fa-spinner fa-spin"></i>
            </div>
        </div>
    </section>

    <div id="modal-carrinho" style="visibility: hidden; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; justify-content: center; align-items: center;">
        <div class="form-box" style="background: #111; border: 1px solid var(--dourado); width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto;">
            <h2 style="color: var(--dourado); margin-bottom: 20px;">Meu Carrinho</h2>
            <div id="itens-carrinho"></div>
            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
            <h3 id="total-carrinho" style="text-align: right; color: white; font-size: 1.5rem;">Total: R$ 0,00</h3>
            <button onclick="finalizarCompra()" class="btn-confirmar" style="margin-top: 20px; width: 100%; background: #25D366; color: white; font-size: 1.1rem; border-color: #25D366;">PEDIR VIA WHATSAPP</button>
            <button onclick="fecharCarrinho()" class="btn-horario" style="margin-top: 15px; width: 100%; background: transparent; color: var(--texto-cinza);">Voltar para a Loja</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. FUNÇÕES DE INTERFACE (Menu e Toasts)
        // ==========================================
        const menuToggle = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');
        if (menuToggle) { menuToggle.addEventListener('click', () => { navLinks.classList.toggle('active'); }); }

        function mostrarAviso(mensagem) {
            const toast = document.createElement("div");
            toast.innerText = mensagem;
            toast.style.cssText = `
                position: fixed; bottom: 20px; right: 20px; 
                background: rgba(18, 18, 18, 0.9); color: var(--dourado); 
                padding: 15px 25px; border-radius: 8px; 
                border: 1px solid var(--dourado); z-index: 9999; 
                box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
                font-family: 'Poppins', sans-serif;
                transition: opacity 0.5s;
            `;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = "0";
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // ==========================================
        // 2. CARREGAR VITRINE DO BANCO DE DADOS
        // ==========================================
        function carregarVitrine() {
            const vitrine = document.getElementById('vitrine-produtos');

            database.ref('produtos').on('value', snapshot => {
                vitrine.innerHTML = ""; 
                const data = snapshot.val();

                if(!data) {
                    vitrine.innerHTML = `
                        <div style="grid-column: span 3; text-align: center; padding: 50px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid #333;">
                            <h3 style="color: var(--dourado); margin-bottom: 10px;">Estoque Renovando</h3>
                            <p style="color: var(--texto-cinza);">Os nossos produtos esgotaram. Volte em breve!</p>
                        </div>`;
                    return;
                }

                snapshot.forEach(child => {
                    const p = child.val();
                    const precoFmt = parseFloat(p.preco).toFixed(2).replace('.', ',');
                    
                    vitrine.innerHTML += `
                        <div class="card-item" style="display: flex; flex-direction: column; justify-content: space-between; height: 100%;">
                            <div>
                                <img src="${p.imagem}" alt="${p.nome}" style="width: 100%; height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333;">
                                <h3 style="color: var(--branco); font-size: 1.2rem; margin-bottom: 10px;">${p.nome}</h3>
                            </div>
                            <div>
                                <span class="preco-tag" style="display: inline-block; margin-bottom: 15px; font-size: 1.4rem;">R$ ${precoFmt}</span>
                                <button onclick="adicionarAoCarrinho('${p.nome}', ${p.preco})" class="btn-confirmar" style="width: 100%; padding: 12px; display: flex; justify-content: center; align-items: center; gap: 10px;">
                                    🛒 ADICIONAR
                                </button>
                            </div>
                        </div>
                    `;
                });
            });
        }
        
        carregarVitrine();

        // ==========================================
        // 3. LÓGICA DO CARRINHO (LocalStorage)
        // ==========================================
        let carrinho = JSON.parse(localStorage.getItem('carrinhoJLukas')) || [];

        function atualizarIcone() {
            const contador = document.getElementById('contagem-carrinho');
            contador.innerText = carrinho.length;
            
            // Efeito visual na sacola
            const icone = document.querySelector('.cart-icon');
            if (icone) {
                icone.style.transform = 'scale(1.2)';
                setTimeout(() => icone.style.transform = 'scale(1)', 200);
            }
        }

        function adicionarAoCarrinho(nome, preco) {
            carrinho.push({ nome: nome, preco: parseFloat(preco) });
            localStorage.setItem('carrinhoJLukas', JSON.stringify(carrinho));
            
            atualizarIcone();
            mostrarAviso(`🛒 ${nome} adicionado!`);
        }

        function abrirCarrinho() {
            const modal = document.getElementById('modal-carrinho');
            modal.style.visibility = 'visible';
            renderizarCarrinho();
        }

        function fecharCarrinho() {
            document.getElementById('modal-carrinho').style.visibility = 'hidden';
        }

        function renderizarCarrinho() {
            const lista = document.getElementById('itens-carrinho');
            let total = 0;
            lista.innerHTML = "";
            
            if(carrinho.length === 0) {
                lista.innerHTML = "<p style='color: var(--texto-cinza); text-align: center;'>O seu carrinho está vazio.</p>";
            }

            carrinho.forEach((item, index) => {
                total += item.preco;
                lista.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom:15px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;">
                        <span style="color: white; font-weight: 500;">${item.nome}</span>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <span style="color: var(--dourado); font-weight: bold;">R$ ${item.preco.toFixed(2).replace('.',',')}</span> 
                            <button onclick="removerItem(${index})" style="background:var(--perigo); border:none; color:white; width: 30px; height: 30px; border-radius: 6px; cursor:pointer; font-weight: bold;">X</button>
                        </div>
                    </div>`;
            });
            document.getElementById('total-carrinho').innerText = `Total: R$ ${total.toFixed(2).replace('.',',')}`;
        }

        function removerItem(index) {
            carrinho.splice(index, 1);
            localStorage.setItem('carrinhoJLukas', JSON.stringify(carrinho));
            
            atualizarIcone();
            renderizarCarrinho();
        }

        function finalizarCompra() {
            if(carrinho.length === 0) return alert("O carrinho está vazio! Adicione produtos antes de finalizar.");
            
            let texto = "Olá, JLukas! Gostaria de pedir os seguintes produtos da loja:%0A%0A";
            let total = 0;
            
            carrinho.forEach(item => {
                texto += `📦 *${item.nome}* - R$ ${item.preco.toFixed(2).replace('.',',')}%0A`;
                total += item.preco;
            });
            
            texto += `%0A💰 *Total a pagar: R$ ${total.toFixed(2).replace('.',',')}*`;
            
            // Limpa o carrinho
            carrinho = [];
            localStorage.removeItem('carrinhoJLukas');
            atualizarIcone();
            fecharCarrinho();
            
            // ⚠️ ATENÇÃO: Substitua os 9s pelo seu número real do WhatsApp
            const seuNumeroWhatsApp = "5561999999999"; 
            window.open(`https://api.whatsapp.com/send?phone=${seuNumeroWhatsApp}&text=${texto}`, '_blank');
        }

        // Garante que o ícone atualize ao abrir a página
        window.onload = function() {
            atualizarIcone();
        };
    </script>
</body>
</html>
